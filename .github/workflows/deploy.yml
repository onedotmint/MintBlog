name: Deploy Blog

on:
  workflow_dispatch:
  repository_dispatch:
    types: [publish]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PRIVATE_CONTENT_REPOSITORY: ${{ secrets.PRIVATE_CONTENT_REPOSITORY }}
      PRIVATE_CONTENT_TOKEN: ${{ secrets.PRIVATE_CONTENT_TOKEN }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      PUBLIC_SITE_ORIGIN: ${{ secrets.PUBLIC_SITE_ORIGIN }}
    steps:
      - name: Checkout public repository
        uses: actions/checkout@v4

      - name: Checkout private content repository
        if: ${{ env.PRIVATE_CONTENT_REPOSITORY != '' && env.PRIVATE_CONTENT_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_CONTENT_REPOSITORY }}
          token: ${{ env.PRIVATE_CONTENT_TOKEN }}
          path: private-content

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy dist/
        run: rsync -az --delete dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
