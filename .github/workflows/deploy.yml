name: Deploy MintBlog

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mintblog-production
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  NODE_VERSION: 24
  PNPM_VERSION: 10.33.4

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Sync Astro types
        run: pnpm sync

      - name: Check Astro and TypeScript
        run: pnpm check

      - name: Run ESLint
        run: pnpm lint

  publish:
    name: Build and publish image
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: publish
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      BLOG_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

    steps:
      - name: Prepare SSH credentials
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"

      - name: Validate deployment settings
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          case "$DEPLOY_PATH" in
            /*) ;;
            *) echo "DEPLOY_PATH must be an absolute path" >&2; exit 1 ;;
          esac

      - name: Pull, start, and health-check the new image
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && BLOG_IMAGE='$BLOG_IMAGE' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          test -f docker-compose.yml
          test -n "${BLOG_IMAGE:-}"

          previous_container="$(docker compose ps -q web || true)"
          previous_image=""
          if [ -n "$previous_container" ]; then
            previous_image="$(docker inspect --format '{{.Config.Image}}' "$previous_container")"
          fi

          rollback() {
            if [ -n "$previous_image" ]; then
              echo "Rolling back to $previous_image" >&2
              BLOG_IMAGE="$previous_image" docker compose up -d --remove-orphans
            else
              echo "Stopping the unhealthy first deployment" >&2
              docker compose down
            fi
          }

          if ! docker compose pull; then
            echo "Unable to pull $BLOG_IMAGE" >&2
            exit 1
          fi

          if ! docker compose up -d --remove-orphans; then
            echo "Unable to start $BLOG_IMAGE" >&2
            rollback
            exit 1
          fi

          container_id="$(docker compose ps -q web)"
          if [ -z "$container_id" ]; then
            echo "MintBlog container was not created" >&2
            rollback
            exit 1
          fi

          health_status=""
          for attempt in $(seq 1 30); do
            health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"
            case "$health_status" in
              healthy)
                docker compose ps
                exit 0
                ;;
              unhealthy)
                break
                ;;
            esac
            sleep 2
          done

          echo "MintBlog container health check failed: $health_status" >&2
          docker compose logs --tail=100 web >&2 || true

          rollback
          exit 1
          REMOTE_SCRIPT
