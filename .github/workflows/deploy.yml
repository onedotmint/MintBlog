name: Deploy Blog

on:
  workflow_dispatch:
  repository_dispatch:
    types: [publish]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mintblog

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PRIVATE_CONTENT_REPOSITORY: ${{ secrets.PRIVATE_CONTENT_REPOSITORY }}
      PRIVATE_CONTENT_TOKEN: ${{ secrets.PRIVATE_CONTENT_TOKEN }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      PUBLIC_SITE_ORIGIN: ${{ secrets.PUBLIC_SITE_ORIGIN }}
      BLOG_IMAGE: ghcr.io/${{ github.repository_owner }}/mintblog:${{ github.sha }}
      BLOG_PORT: ${{ vars.BLOG_PORT || '8080' }}
    steps:
      - name: Checkout public repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check deployment configuration
        run: npm run check:deploy-env

      - name: Checkout private content repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_CONTENT_REPOSITORY }}
          token: ${{ env.PRIVATE_CONTENT_TOKEN }}
          path: private-content

      - name: Log in to GHCR for publish
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.BLOG_IMAGE }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            PUBLIC_SITE_ORIGIN=${{ env.PUBLIC_SITE_ORIGIN }}
            PRIVATE_CONTENT_STRICT=1
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload production Compose file
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp compose.prod.yaml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/compose.yaml"
          printf 'BLOG_IMAGE=%s\nBLOG_PORT=%s\n' "$BLOG_IMAGE" "$BLOG_PORT" | ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_PATH}/.env'"

      - name: Deploy production container
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose pull && docker compose up -d"

      - name: Check deployed site health
        run: npm run check:deployment-health
