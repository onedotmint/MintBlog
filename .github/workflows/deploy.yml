name: Deploy Blog

on:
  workflow_dispatch:
  repository_dispatch:
    types: [publish]

concurrency:
  group: production-deploy-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mintblog

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PRIVATE_CONTENT_REPOSITORY: ${{ secrets.PRIVATE_CONTENT_REPOSITORY }}
      PRIVATE_CONTENT_TOKEN: ${{ secrets.PRIVATE_CONTENT_TOKEN }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      PUBLIC_SITE_ORIGIN: ${{ secrets.PUBLIC_SITE_ORIGIN }}
      BLOG_IMAGE: ghcr.io/${{ github.repository_owner }}/mintblog:${{ github.sha }}
      BLOG_PORT: ${{ vars.BLOG_PORT || '8080' }}
    steps:
      - name: Checkout public repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Check deployment configuration
        run: npm run check:deploy-env

      - name: Checkout private content repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_CONTENT_REPOSITORY }}
          token: ${{ env.PRIVATE_CONTENT_TOKEN }}
          path: private-content

      - name: Install dependencies
        run: npm ci

      - name: Build production static output
        run: npm run build:deploy

      - name: Prepare production image context
        run: |
          mkdir -p "${RUNNER_TEMP}/blog-image-context"
          cp Dockerfile.production "${RUNNER_TEMP}/blog-image-context/Dockerfile"
          cp nginx.conf "${RUNNER_TEMP}/blog-image-context/nginx.conf"
          cp -R dist "${RUNNER_TEMP}/blog-image-context/dist"

      - name: Log in to GHCR for publish
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: ${{ runner.temp }}/blog-image-context
          push: true
          tags: |
            ${{ env.BLOG_IMAGE }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/known_hosts

      - name: Upload production Compose file
        run: |
          ssh -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes compose.prod.yaml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/compose.yaml"
          printf 'BLOG_IMAGE=%s\nBLOG_PORT=%s\n' "$BLOG_IMAGE" "$BLOG_PORT" | ssh -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_PATH}/.env'"

      - name: Deploy production container
        run: |
          ssh -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose pull && docker compose up -d"

      - name: Check deployed site health
        run: npm run check:deployment-health
