services:
  blog:
    image: ${BLOG_IMAGE:?Set BLOG_IMAGE to the published production image}
    ports:
      - "${BLOG_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
