<svg
  xmlns="http://www.w3.org/2000/svg"
  width="64"
  height="64"
  viewBox="0 0 64 64"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">onedotmint</title>
  <desc id="desc">A geometric o mark with a mint center dot.</desc>
  <style>
    .mark-ring { fill: none; stroke: #46534d }
    .mark-dot { fill: #49b88d }
    @media (prefers-color-scheme: dark) {
      .mark-ring { stroke: #e7efea }
      .mark-dot { fill: #79d7b2 }
    }
  </style>
  <circle class="mark-ring" cx="32" cy="32" r="17" stroke-width="4.5" />
  <circle class="mark-dot" cx="32" cy="32" r="5.5" />
</svg>
